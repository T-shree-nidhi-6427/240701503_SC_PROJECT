<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Product Review System</title>
    <meta name="description" content="Login or register for the ultimate product review system.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="center-content body-bg">
    <div class="auth-container glass-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Please login to your account or register to start reviewing products.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <div id="login-form" class="form-section active">
            <form onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>

        <div id="register-form" class="form-section">
            <form onsubmit="handleAuth(event, 'register')">
                <div class="input-group">
                    <label for="register-role">I am a...</label>
                    <select id="register-role" required>
                        <option value="user">Customer (Write Reviews)</option>
                        <option value="admin">Admin (Manage Products)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" required placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" required placeholder="Choose a password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
        <div id="auth-message" class="message"></div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            document.getElementById('auth-message').textContent = '';
        }
    </script>
</body>

</html>

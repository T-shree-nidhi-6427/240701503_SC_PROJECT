<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Review System</title>
    <meta name="description" content="User settings.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="body-bg">
    <nav class="navbar glass-card">
        <div class="nav-brand">ReviewApp</div>
        <div class="nav-links">
            <span id="user-greeting"></span>
            <a href="products.html">Products</a>
            <a href="profile.html">Profile</a>
            <a href="settings.html" class="active">Settings</a>
            <a href="admin.html" id="admin-link" style="display: none;">Admin Dashboard</a>
            <button onclick="logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1>Account Settings</h1>
        </header>

        <div class="auth-container glass-card" style="max-width: 600px; margin: 0 auto; text-align: left;">
            <h2>Preferences</h2>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
                <div>
                    <h3>Email Notifications</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Receive alerts when someone replies to your reviews.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
                <div>
                    <h3>Dark Mode</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">The app is beautifully dark by default.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked disabled>
                    <span class="slider round"></span>
                </label>
            </div>
            
            <div style="margin-top: 40px;">
                <h3>Account Actions</h3>
                <button onclick="logout()" class="btn btn-danger w-100" style="margin-top: 15px;">Log Out of All Devices</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        checkAuth();
    </script>
    <style>
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--secondary); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:focus + .slider { box-shadow: 0 0 1px var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</body>
</html>

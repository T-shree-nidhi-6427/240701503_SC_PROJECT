<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Review System</title>
    <meta name="description" content="Browse and review products.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="body-bg">
    <nav class="navbar glass-card">
        <div class="nav-brand">ReviewApp</div>
        <div class="nav-links">
            <span id="user-greeting"></span>
            <a href="products.html" class="active">Products</a>
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="admin.html" id="admin-link" style="display: none;">Admin Dashboard</a>
            <button onclick="logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1>Product Catalog</h1>
            <button onclick="openAddProductModal()" class="btn btn-primary" id="add-product-btn">Add New Product</button>
        </header>

        <div class="controls-bar glass-card">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search products..." oninput="fetchProducts()">
            </div>
            <div class="filters">
                <select id="category-filter" onchange="fetchProducts()">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                    <option value="home">Home & Kitchen</option>
                    <option value="other">Other</option>
                </select>
                <select id="sort-filter" onchange="fetchProducts()">
                    <option value="">Sort By</option>
                    <option value="rating_desc">Highest Rated</option>
                    <option value="rating_asc">Lowest Rated</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="products-container">
            <!-- Products will be injected here via JS -->
            <div class="loading">Loading products...</div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="add-product-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close" onclick="closeModal('add-product-modal')">&times;</span>
            <h2 id="product-modal-title">Add / Edit Product</h2>
            <form onsubmit="handleAddProduct(event)">
                <input type="hidden" id="prod-id">
                <div class="input-group">
                    <label for="prod-name">Product Name</label>
                    <input type="text" id="prod-name" required>
                </div>
                <div class="input-group">
                    <label for="prod-desc">Description</label>
                    <textarea id="prod-desc" required rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label for="prod-cat">Category</label>
                    <select id="prod-cat" required>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="home">Home & Kitchen</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="prod-price">Price (₹)</label>
                    <input type="number" id="prod-price" step="0.01" required>
                </div>
                <div class="input-group">
                    <label for="prod-image">Image URL (Optional)</label>
                    <input type="text" id="prod-image" placeholder="https://example.com/image.jpg">
                </div>
                <button type="submit" class="btn btn-primary w-100">Add Product</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check authentication
        checkAuth();
        // Load products on page load
        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
